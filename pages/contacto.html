<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Contacta con Kaizen Medical Solutions. Formulario de contacto y agendamiento de consultoría.">

    <title>Contacto - Kaizen Medical Solutions</title>

    <!-- Google Fonts - Tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>

<body>
    <!-- HEADER -->
    <header id="navbar"></header>

    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Contacto</h1>
                <p>Cuéntanos cómo podemos ayudarte a optimizar tu salud ocupacional</p>
            </div>
        </div>
    </section>

    <!-- SECCIÓN DE CONTACTO -->
    <section class="section" id="contacto">
        <div class="container">
            <div class="grid-2" style="gap: var(--space-2xl);">
                <!-- FORMULARIO -->
                <div>
                    <h2 class="text-primary mb-lg">Envíanos un mensaje</h2>
                    <form id="contact-form" class="contact-form">
                        <div id="form-fields"></div>
                        <button type="submit" class="btn btn-primary btn-lg">Enviar Mensaje</button>
                    </form>
                    <div id="form-message" style="margin-top: var(--space-lg); display: none;"></div>
                </div>

                <!-- AGENDAMIENTO / INFO -->
                <div>
                    <h2 class="text-primary mb-lg">Agenda tu consultoría</h2>
                    <p style="margin-bottom: var(--space-xl); font-size: var(--font-size-lg);">
                        Sesión de 15 minutos para analizar tu situación específica.
                    </p>

                    <!-- Calendly embed -->
                    <div id="calendly-embed"></div>

                    <!-- Información de contacto -->
                    <div
                        style="margin-top: var(--space-2xl); padding-top: var(--space-xl); border-top: 1px solid var(--gray-light);">
                        <h3 class="text-primary mb-lg">Información de Contacto</h3>
                        <div id="contact-info"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer id="footer"></footer>

    <!-- Calendly Script -->
    <script src="https://assets.calendly.com/assets/external/widget.js"></script>

    <script src="../js/config.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/interactions.js"></script>
    <script src="../js/contacto.js"></script>
</body>

</html>

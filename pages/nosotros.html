<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Conoce quiénes somos en Kaizen Medical Solutions. Misión, visión, valores y nuestro diferencial en salud ocupacional.">

    <title>Nosotros - Kaizen Medical Solutions</title>

    <!-- Google Fonts - Tipografía moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>

<body>
    <!-- HEADER -->
    <header id="navbar"></header>

    <!-- HERO -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Sobre Nosotros</h1>
                <p>Transformando la salud ocupacional en ventaja competitiva</p>
            </div>
        </div>
    </section>

    <!-- MISIÓN Y VISIÓN -->
    <section class="section">
        <div class="container">
            <div class="grid-2">
                <div>
                    <h2 class="text-primary">Nuestra Misión</h2>
                    <p id="mission-text" style="font-size: var(--font-size-lg); line-height: 1.8;"></p>
                </div>
                <div>
                    <h2 class="text-primary">Nuestra Visión</h2>
                    <p id="vision-text" style="font-size: var(--font-size-lg); line-height: 1.8;"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- VALORES -->
    <section class="section section-light">
        <div class="container">
            <h2 class="section-title">Nuestros Valores</h2>
            <div class="value-cards" id="values-cards"></div>
        </div>
    </section>

    <!-- DIFERENCIAL -->
    <section class="section">
        <div class="container">
            <h2 class="section-title">Nuestro Diferencial</h2>
            <div style="max-width: 800px; margin: 0 auto;">
                <ul id="differential-list"
                    style="list-style: none; display: flex; flex-direction: column; gap: var(--space-lg);"></ul>
            </div>
        </div>
    </section>

    <!-- CTA -->
    <section class="section">
        <div class="container">
            <div class="cta-section">
                <h2>¿Listo para transformar la salud ocupacional en tu empresa?</h2>
                <a href="/pages/contacto.html" class="btn btn-secondary btn-lg">Agenda una Consultoría</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer id="footer"></footer>

    <script src="/js/config.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/interactions.js"></script>
    <script src="/js/about.js"></script>
</body>

</html>
